<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="640" rx="24" fill="#F8FAFC"/>
  <text x="60" y="72" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Corrección individual: vista rápida</text>

  <rect x="60" y="150" width="250" height="120" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="90" y="194" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">1. Cargar archivos</text>
  <text x="90" y="228" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">XML original</text>
  <text x="90" y="252" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">+ nota rechazada</text>

  <rect x="360" y="150" width="220" height="120" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="390" y="194" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">2. Analizar</text>
  <text x="390" y="228" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">Comparar totales</text>
  <text x="390" y="252" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">y revisar diferencias</text>

  <rect x="630" y="150" width="220" height="120" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="660" y="194" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">3. Recalcular</text>
  <text x="660" y="228" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">Aplicar ajuste</text>
  <text x="660" y="252" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">si hace falta</text>

  <rect x="900" y="150" width="240" height="120" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="930" y="194" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">4. Generar y enviar</text>
  <text x="930" y="228" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">Nueva clave, fecha</text>
  <text x="930" y="252" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">y consecutivo</text>

  <path d="M310 210H360" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M580 210H630" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M850 210H900" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>

  <rect x="110" y="360" width="980" height="190" rx="22" fill="#DBEAFE"/>
  <text x="150" y="410" fill="#1E3A8A" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Al final debería ver</text>
  <text x="150" y="452" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="18">• nueva clave</text>
  <text x="150" y="484" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="18">• nuevo consecutivo</text>
  <text x="150" y="516" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="18">• nueva fecha</text>
  <text x="470" y="452" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="18">• total corregido</text>
  <text x="470" y="484" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="18">• resumen del ajuste</text>
  <text x="470" y="516" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="18">• respuesta de MDG si se envió</text>
</svg>
