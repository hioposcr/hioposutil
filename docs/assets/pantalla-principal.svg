<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" rx="24" fill="#F8FAFC"/>
  <text x="60" y="72" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Qué verá en la pantalla principal</text>
  <rect x="60" y="110" width="1080" height="590" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>

  <rect x="100" y="150" width="1000" height="70" rx="16" fill="#E2E8F0"/>
  <text x="130" y="194" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Encabezado y acceso</text>

  <rect x="100" y="250" width="300" height="140" rx="18" fill="#DBEAFE"/>
  <text x="125" y="292" fill="#1E3A8A" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Selector de módulo</text>
  <text x="125" y="326" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="16">Aquí decide si el caso es</text>
  <text x="125" y="352" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="16">individual o masivo.</text>

  <rect x="430" y="250" width="320" height="140" rx="18" fill="#FEF3C7"/>
  <text x="455" y="292" fill="#92400E" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Configuración MDG</text>
  <text x="455" y="326" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="16">Ambiente, tenantId</text>
  <text x="455" y="352" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="16">y password del cliente.</text>

  <rect x="780" y="250" width="320" height="140" rx="18" fill="#E9D5FF"/>
  <text x="805" y="292" fill="#6B21A8" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Acciones</text>
  <text x="805" y="326" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="16">Botones para analizar,</text>
  <text x="805" y="352" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="16">generar y enviar.</text>

  <rect x="100" y="430" width="620" height="220" rx="18" fill="#DCFCE7"/>
  <text x="125" y="470" fill="#166534" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Área de trabajo</text>
  <text x="125" y="505" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="16">Aquí se cargan los archivos</text>
  <text x="125" y="531" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="16">y se completa la información</text>
  <text x="125" y="557" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="16">de cada caso.</text>

  <rect x="750" y="430" width="350" height="220" rx="18" fill="#FCE7F3"/>
  <text x="775" y="470" fill="#9D174D" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Resultados</text>
  <text x="775" y="505" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="16">Aquí verá resúmenes,</text>
  <text x="775" y="531" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="16">nuevas claves, estados</text>
  <text x="775" y="557" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="16">y respuestas de MDG.</text>
</svg>
