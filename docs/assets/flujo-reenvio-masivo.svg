<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="680" rx="24" fill="#F8FAFC"/>
  <text x="60" y="72" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Reenvío masivo: vista rápida</text>

  <rect x="60" y="150" width="220" height="120" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="90" y="194" fill="#15803D" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">1. Cargar XML</text>
  <text x="90" y="228" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">Ingresar el lote</text>
  <text x="90" y="252" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">de documentos</text>

  <rect x="320" y="150" width="240" height="120" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="350" y="194" fill="#15803D" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">2. Configurar lote</text>
  <text x="350" y="228" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">Terminal, número</text>
  <text x="350" y="252" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">inicial y pausa</text>

  <rect x="600" y="150" width="220" height="120" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="630" y="194" fill="#15803D" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">3. Preparar</text>
  <text x="630" y="228" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">Crear nuevos datos</text>
  <text x="630" y="252" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">para la cola</text>

  <rect x="860" y="150" width="280" height="120" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="890" y="194" fill="#15803D" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">4. Enviar a MDG</text>
  <text x="890" y="228" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">Procesar el lote</text>
  <text x="890" y="252" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">de forma controlada</text>

  <path d="M280 210H320" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M560 210H600" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M820 210H860" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>

  <rect x="110" y="350" width="450" height="220" rx="22" fill="#DCFCE7"/>
  <text x="145" y="398" fill="#166534" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">La cola muestra estados</text>
  <text x="145" y="440" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="18">• Listo</text>
  <text x="145" y="472" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="18">• Procesando</text>
  <text x="145" y="504" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="18">• Enviado</text>
  <text x="145" y="536" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="18">• Con error</text>

  <rect x="640" y="350" width="450" height="220" rx="22" fill="#FEF3C7"/>
  <text x="675" y="398" fill="#92400E" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">El envío se protege así</text>
  <text x="675" y="440" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="18">• no todo sale al mismo tiempo</text>
  <text x="675" y="472" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="18">• se reutiliza token por grupo</text>
  <text x="675" y="504" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="18">• existe pausa entre emisiones</text>
  <text x="675" y="536" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="18">• reduce presión sobre MDG</text>
</svg>
